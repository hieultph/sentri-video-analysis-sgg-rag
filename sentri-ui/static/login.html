<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sentri</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>🛡️ Sentri</h1>
          <p>Personal Camera Monitoring System</p>
        </div>

        <form id="loginForm" class="auth-form">
          <h2>Login</h2>

          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              placeholder="Enter username"
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Enter password"
              autocomplete="current-password"
            />
          </div>

          <div
            id="error-message"
            class="error-message"
            style="display: none"
          ></div>

          <button type="submit" class="btn btn-primary">Login</button>

          <div class="auth-footer">
            Don't have an account?
            <a href="/static/register.html">Register here</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("error-message");

      // Check if already logged in
      if (localStorage.getItem("sentri_token")) {
        window.location.href = "/static/index.html";
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            // Store token and user info
            localStorage.setItem("sentri_token", data.token);
            localStorage.setItem("sentri_user", JSON.stringify(data.user));

            // Redirect to dashboard
            window.location.href = "/static/index.html";
          } else {
            showError(data.detail || "Login failed");
          }
        } catch (error) {
          showError("Network error. Please try again.");
          console.error("Login error:", error);
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
        setTimeout(() => {
          errorMessage.style.display = "none";
        }, 5000);
      }
    </script>
  </body>
</html>
