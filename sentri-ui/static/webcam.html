<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webcam Stream - Sentri</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 30px;
        max-width: 900px;
        width: 100%;
      }

      h1 {
        text-align: center;
        color: #667eea;
        margin-bottom: 10px;
        font-size: 2em;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 0.9em;
      }

      .video-wrapper {
        position: relative;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      #webcamStream {
        width: 100%;
        height: auto;
        display: block;
      }

      .status {
        text-align: center;
        margin-top: 20px;
        padding: 10px;
        border-radius: 8px;
        font-weight: 500;
      }

      .status.connected {
        background: #d4edda;
        color: #155724;
      }

      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
      }

      .status.loading {
        background: #fff3cd;
        color: #856404;
      }

      .viewers-count {
        text-align: center;
        margin-top: 15px;
        color: #666;
        font-size: 0.9em;
      }

      .info-box {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
      }

      .info-box h3 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 1.1em;
      }

      .info-box ul {
        list-style: none;
        padding-left: 0;
      }

      .info-box li {
        padding: 5px 0;
        color: #555;
      }

      .info-box li:before {
        content: "✓ ";
        color: #28a745;
        font-weight: bold;
        margin-right: 5px;
      }

      .btn-home {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 24px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        text-align: center;
        transition: background 0.3s;
      }

      .btn-home:hover {
        background: #764ba2;
      }

      .loading-spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.5em;
        }

        .container {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎥 Live Webcam Stream</h1>
      <p class="subtitle">Multiple viewers supported • Real-time streaming</p>

      <div class="video-wrapper">
        <img
          id="webcamStream"
          src="/webcam/stream"
          alt="Webcam Stream"
          style="display: none"
        />
        <div id="loadingIndicator" class="loading-spinner"></div>
      </div>

      <div id="status" class="status loading">🔄 Connecting to stream...</div>

      <div class="viewers-count">
        👥 Stream is accessible by multiple viewers simultaneously
      </div>

      <div class="info-box">
        <h3>📋 Stream Information</h3>
        <ul>
          <li>Resolution: 640x480</li>
          <li>Format: MJPEG</li>
          <li>Frame Rate: ~30 FPS</li>
          <li>Quality: 70%</li>
        </ul>
      </div>

      <div style="text-align: center">
        <a href="/" class="btn-home">🏠 Back to Dashboard</a>
      </div>
    </div>

    <script>
      const streamImg = document.getElementById("webcamStream");
      const statusDiv = document.getElementById("status");
      const loadingIndicator = document.getElementById("loadingIndicator");

      // Check if stream loads successfully
      streamImg.onload = function () {
        streamImg.style.display = "block";
        loadingIndicator.style.display = "none";
        statusDiv.className = "status connected";
        statusDiv.innerHTML = "✅ Stream connected and running";
      };

      streamImg.onerror = function () {
        loadingIndicator.style.display = "none";
        statusDiv.className = "status disconnected";
        statusDiv.innerHTML =
          "❌ Unable to connect to webcam stream. Make sure the server is running.";
      };

      // Retry connection after error
      let retryCount = 0;
      const maxRetries = 3;

      function retryConnection() {
        if (retryCount < maxRetries) {
          retryCount++;
          statusDiv.innerHTML = `🔄 Retrying connection (${retryCount}/${maxRetries})...`;
          setTimeout(() => {
            streamImg.src = "/webcam/stream?" + new Date().getTime();
          }, 2000);
        } else {
          statusDiv.innerHTML =
            "❌ Failed to connect after multiple attempts. Please check if webcam is available.";
        }
      }

      streamImg.addEventListener("error", () => {
        setTimeout(retryConnection, 1000);
      });
    </script>
  </body>
</html>
